<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Side | Command Center</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="admin-theme">
    <nav class="top-nav">
        <h2>ADMIN DASHBOARD</h2>
        <div>
            <span>ID: admin@admin.com</span>
            <button id="logoutBtn">Logout</button>
        </div>
    </nav>

    <div class="admin-content">
        <div class="stats-row">
            <div class="stat-card">
                <h3>Students Enrolled</h3>
                <p id="studentCount">0</p>
            </div>
            <div class="stat-card">
                <h3>Active Tests</h3>
                <p>Appti, Common, AI</p>
            </div>
        </div>

        <div class="management-row">
            <div class="card">
                <h3>Manage Question Bank</h3>
                <select id="bankType">
                    <option value="appti">Appti Bank</option>
                    <option value="common">Common Test</option>
                    <option value="ai">AI Mode Interview</option>
                </select>
                <textarea id="qInput" placeholder="Enter question text..."></textarea>
                <button id="addQBtn" class="btn-success">Add Question to Bank</button>
            </div>

            <div class="card">
                <h3>Live Proctoring Alerts</h3>
                <ul id="proctorLogs">
                    </ul>
            </div>
        </div>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
