<!DOCTYPE html>
<html lang="en">
<head>
    <title>Student Portal | AI Mode</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="test-container">
        <div id="proctor-status">AI Proctor: <span style="color: green;">Active</span></div>
        
        <div class="ai-box">
            <h2>AI Interview Mode</h2>
            <button id="askBtn">Step 1: AI Ask Question</button>
            <button id="recordBtn">Step 2: Voice Answer</button>
            
            <div class="transcript-box">
                <strong>Your Answer:</strong>
                <p id="transcript">...</p>
            </div>
        </div>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
