<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal | RecruitPro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0b0e14] text-white font-sans">

    <div id="regView" class="min-h-screen flex items-center justify-center p-6">
        <div class="bg-[#161b22] p-8 rounded-3xl border border-slate-800 w-full max-w-md shadow-2xl">
            <h2 class="text-3xl font-bold mb-2">Student Register</h2>
            <p class="text-slate-500 mb-8 text-sm">Join the placement drive for 2026</p>
            
            <div class="space-y-4">
                <input id="sName" type="text" placeholder="Full Name" class="w-full bg-[#0d1117] border border-slate-700 rounded-xl p-4 outline-none focus:border-cyan-500">
                <input id="sEmail" type="email" placeholder="Email Address" class="w-full bg-[#0d1117] border border-slate-700 rounded-xl p-4 outline-none focus:border-cyan-500">
                <button onclick="registerStudent()" class="w-full py-4 bg-cyan-600 rounded-xl font-bold hover:bg-cyan-500 transition shadow-lg shadow-cyan-900/20">Register for Test</button>
            </div>
        </div>
    </div>

    <div id="examView" class="hidden min-h-screen p-6">
        <header class="max-w-4xl mx-auto flex justify-between items-center mb-10">
            <div>
                <h1 id="welcomeText" class="text-2xl font-bold text-cyan-400">Welcome</h1>
                <p class="text-slate-500 text-sm">Status: Registered & Connected</p>
            </div>
            <div id="testStatus" class="bg-slate-800 px-4 py-2 rounded-xl border border-slate-700 animate-pulse text-xs">
                Waiting for Admin to start test...
            </div>
        </header>

        <main class="max-w-4xl mx-auto bg-[#161b22] p-10 rounded-3xl border border-slate-800 shadow-xl text-center">
            <div id="noTest">
                <h3 class="text-xl mb-4">No Active Exam</h3>
                <p class="text-slate-400">Please wait for the Admin to broadcast the test schedule.</p>
            </div>

            <div id="activeTest" class="hidden">
                <h2 id="currentTestTitle" class="text-3xl font-black mb-2 text-white uppercase tracking-tighter">--</h2>
                <p class="text-cyan-500 font-bold mb-8">EXAM IS LIVE</p>
                <button class="px-10 py-4 bg-green-600 rounded-2xl font-bold hover:bg-green-500 transition">START COMPUTER BASED TEST (CBT)</button>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, push, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBKqBYNRY_80b_UOLg1ls9pIKdX-Y8b3CM",
            authDomain: "placement-96094.firebaseapp.com",
            databaseURL: "https://placement-96094-default-rtdb.firebaseio.com",
            projectId: "placement-96094",
            storageBucket: "placement-96094.firebasestorage.app",
            messagingSenderId: "1061247846675",
            appId: "1:1061247846675:web:c6885811fcf1884582b2e6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // REGISTRATION LOGIC
        window.registerStudent = () => {
            const name = document.getElementById('sName').value;
            const email = document.getElementById('sEmail').value;

            if(!name || !email) return alert("Please enter details");

            // Push to Firebase 'students' node
            const studentRef = ref(db, 'students');
            const newStudent = push(studentRef);
            set(newStudent, {
                name: name,
                email: email,
                status: "Registered",
                timestamp: Date.now()
            }).then(() => {
                document.getElementById('regView').classList.add('hidden');
                document.getElementById('examView').classList.remove('hidden');
                document.getElementById('welcomeText').innerText = "Hello, " + name;
                listenForTests();
            });
        };

        // LISTEN FOR ADMIN BROADCASTS
        function listenForTests() {
            onValue(ref(db, 'current_test'), (snap) => {
                const data = snap.val();
                if(data && data.active) {
                    document.getElementById('noTest').classList.add('hidden');
                    document.getElementById('activeTest').classList.remove('hidden');
                    document.getElementById('currentTestTitle').innerText = data.title;
                    document.getElementById('testStatus').innerText = "Test Scheduled: " + data.startTime;
                    document.getElementById('testStatus').classList.remove('animate-pulse');
                    document.getElementById('testStatus').classList.add('bg-cyan-900/30', 'text-cyan-400', 'border-cyan-500/50');
                }
            });
        }
    </script>
</body>
</html>
