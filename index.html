<script>
window.activeTargetUID = null;
window.userUID = null;
window.interviewMode = 'AI';
window.questionBank = [];
window.candidateRegistry = JSON.parse(localStorage.getItem('candidateRegistry')) || {};

function launchAdmin() {
  const email = document.getElementById('adm-user').value.trim();
  const key = document.getElementById('adm-key').value.trim();
  if (!email || !key) return alert('Admin credentials required');
  document.getElementById('gate-overlay').classList.add('hidden');
  document.getElementById('admin-hub').classList.remove('hidden');
  syncSurveillanceMatrix();
}

function portalAccess() {
  const email = document.getElementById('cand-email').value.trim();
  const password = document.getElementById('cand-dob').value.trim();
  if (!email.includes('@')) return alert('Valid email required');
  if (!password) return alert('Password required');

  if (!window.candidateRegistry[email]) {
    window.candidateRegistry[email] = { password, score: 0, status: 'REGISTERED', violations: 0 };
  } else if (window.candidateRegistry[email].password !== password) {
    return alert('Invalid credentials');
  }

  localStorage.setItem('candidateRegistry', JSON.stringify(window.candidateRegistry));
  window.userUID = email;
  document.getElementById('gate-overlay').classList.add('hidden');
  document.getElementById('exam-portal').classList.remove('hidden');
  document.getElementById('disp-roll-id').innerText = email.toUpperCase();

  initCamera();
  initSecurityProtocol();
  startTimer();
  if (window.interviewMode === 'AI') deliverAIQuestion();
}

function syncSurveillanceMatrix() {
  const body = document.getElementById('candidate-matrix-body');
  body.innerHTML = '';
  Object.keys(window.candidateRegistry).forEach(email => {
    const c = window.candidateRegistry[email];
    body.innerHTML += `
      <tr>
        <td class="p-4">${email}</td>
        <td class="p-4">${c.score}%</td>
        <td class="p-4">${c.status}</td>
        <td class="p-4">
          <button onclick="setTarget('${email}')">Target</button>
        </td>
      </tr>`;
  });
}

function setTarget(uid) {
  window.activeTargetUID = uid;
  alert('TARGET LOCKED: ' + uid);
}

function setInterviewMode(mode) {
  window.interviewMode = mode;
  alert('MODE: ' + mode);
}

function pushLiveQuestion(uid) {
  if (window.interviewMode !== 'LIVE') return alert('LIVE mode only');
  if (!uid) return alert('No target selected');
  const q = document.getElementById('live-qn-input').value.trim();
  if (!q) return alert('Enter valid question');
  appendChatBubble('ADMIN', q);
}

function deliverAIQuestion() {
  if (!window.questionBank.length) return appendChatBubble('AI_SYSTEM', 'No question bank loaded');
  const q = window.questionBank[Math.floor(Math.random() * window.questionBank.length)];
  appendChatBubble('AI_SYSTEM', q);
}

function commitResponse() {
  const val = document.getElementById('candidate-input').value.trim();
  if (!val) return;
  renderUserBubble(val);
  document.getElementById('candidate-input').value = '';
  const score = Math.floor(Math.random() * 25) + 75;
  window.candidateRegistry[window.userUID].score = score;
  localStorage.setItem('candidateRegistry', JSON.stringify(window.candidateRegistry));
  setTimeout(() => {
    appendChatBubble('AI_SYSTEM', 'Score: ' + score + '%');
    if (window.interviewMode === 'AI') deliverAIQuestion();
  }, 1000);
}

function appendChatBubble(sender, msg) {
  const box = document.getElementById('interaction-box');
  box.innerHTML += `<div><strong>${sender}:</strong> ${msg}</div>`;
  box.scrollTop = box.scrollHeight;
}

function renderUserBubble(msg) {
  const box = document.getElementById('interaction-box');
  box.innerHTML += `<div style="text-align:right;"><strong>YOU:</strong> ${msg}</div>`;
  box.scrollTop = box.scrollHeight;
}

function initCamera() {
  navigator.mediaDevices.getUserMedia({ video: true, audio: true })
    .then(stream => document.getElementById('web-feed').srcObject = stream)
    .catch(() => alert('Camera required'));
}

function initSecurityProtocol() {
  window.onblur = () => {
    document.getElementById('proctor-logs').innerHTML += '<div>SECURITY BREACH</div>';
  };
  document.addEventListener('contextmenu', e => e.preventDefault());
}

function startTimer() {
  let seconds = 2700;
  const timer = document.getElementById('clock-timer');
  clearInterval(window.examTimer);
  window.examTimer = setInterval(() => {
    if (seconds <= 0) return clearInterval(window.examTimer);
    seconds--;
    const m = String(Math.floor(seconds / 60)).padStart(2, '0');
    const s = String(seconds % 60).padStart(2, '0');
    timer.innerText = `${m}:${s}`;
  }, 1000);
}

const uploader = document.getElementById('file-uploader');
if (uploader) {
  uploader.addEventListener('change', async function(e) {
    const file = e.target.files[0];
    if (!file) return;
    const ext = file.name.split('.').pop().toLowerCase();

    if (ext === 'txt') {
      const text = await file.text();
      processQuestions(text, file.name);
    }

    else if (ext === 'docx') {
      const arrayBuffer = await file.arrayBuffer();
      mammoth.extractRawText({ arrayBuffer }).then(result => {
        processQuestions(result.value, file.name);
      });
    }

    else if (ext === 'pdf') {
      const arrayBuffer = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
      let fullText = '';
      for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const content = await page.getTextContent();
        fullText += content.items.map(item => item.str).join(' ') + '\n';
      }
      processQuestions(fullText, file.name);
    }
  });
}

function processQuestions(content, fileName) {
  window.questionBank = content
    .split(/\r?\n/)
    .filter(q => q.trim().length > 5);

  document.getElementById('parse-status').innerText =
    `${fileName} loaded | ${window.questionBank.length} questions`;
}
</script>

</body>
