<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SGER-2026 | Central Govt Engineering Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_detection"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <style>
        :root { --primary: #0f172a; --accent: #eab308; --danger: #ef4444; }
        body { background: var(--primary); font-family: 'Inter', sans-serif; color: #f1f5f9; }
        .admin-gradient { background: linear-gradient(135deg, #1e293b 0%, #020617 100%); }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        .violation-flash { animation: flash 0.5s infinite alternate; }
        @keyframes flash { from { border-color: transparent; } to { border-color: var(--danger); box-shadow: 0 0 20px var(--danger); } }
    </style>
</head>
<body>

    <div id="auth-gateway" class="fixed inset-0 z-[1000] flex items-center justify-center bg-slate-950 p-6">
        <div class="max-w-4xl w-full grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="glass p-10 rounded-3xl border-t-4 border-yellow-500">
                <h2 class="text-2xl font-black text-white mb-2">CANDIDATE LOGIN</h2>
                <p class="text-xs text-slate-500 mb-8 uppercase font-bold tracking-widest">Recruitment & Assessment Track</p>
                <div class="space-y-4">
                    <select id="track-select" class="w-full bg-slate-900 p-4 rounded-xl border border-slate-800 outline-none focus:border-yellow-500 text-sm font-bold text-yellow-500">
                        <option value="EE">ELECTRICAL ENGINEERING (IES/ESE)</option>
                        <option value="GOV">CENTRAL GOVT JOB (GROUP-A/B)</option>
                    </select>
                    <input id="candidate-id" type="text" placeholder="GOVT ROLL NUMBER" class="w-full bg-slate-900 p-4 rounded-xl border border-slate-800 outline-none focus:border-yellow-500">
                    <button onclick="startCandidateSession()" class="w-full bg-yellow-500 text-slate-950 font-black py-4 rounded-xl hover:bg-yellow-400 transition-all uppercase text-sm">Initiate Assessment</button>
                </div>
            </div>

            <div class="glass p-10 rounded-3xl border-t-4 border-red-600 bg-red-950/5">
                <h2 class="text-2xl font-black text-white mb-2">ADMIN SUPREME</h2>
                <p class="text-xs text-slate-500 mb-8 uppercase font-bold tracking-widest">Authority Control & Oversight</p>
                <div class="space-y-4">
                    <input id="admin-user" type="text" placeholder="ADMIN ID" class="w-full bg-slate-900 p-4 rounded-xl border border-slate-800 outline-none focus:border-red-600">
                    <input id="admin-pass" type="password" placeholder="SECURITY KEY" class="w-full bg-slate-900 p-4 rounded-xl border border-slate-800 outline-none focus:border-red-600">
                    <button onclick="loginAdmin()" class="w-full bg-red-600 text-white font-black py-4 rounded-xl hover:bg-red-500 transition-all uppercase text-sm">Access Command Center</button>
                </div>
            </div>
        </div>
    </div>

    <div id="admin-portal" class="fixed inset-0 z-[500] admin-gradient hidden overflow-hidden flex flex-col">
        <nav class="h-20 border-b border-slate-800 flex items-center justify-between px-10">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 bg-red-600 rounded flex items-center justify-center font-black">A</div>
                <h1 class="text-xl font-black italic tracking-tighter">SUPREME AUTHORITY <span class="text-red-500">CONSOLE</span></h1>
            </div>
            <button onclick="location.reload()" class="bg-slate-800 px-6 py-2 rounded-lg text-xs font-bold hover:bg-slate-700">LOGOUT</button>
        </nav>

        <main class="flex-1 grid grid-cols-12 p-8 gap-8">
            <div class="col-span-8 flex flex-col gap-6">
                <div class="glass p-8 rounded-3xl flex-1 overflow-hidden flex flex-col">
                    <h3 class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-6">Live Candidate Database</h3>
                    <div class="overflow-y-auto">
                        <table class="w-full text-left">
                            <thead class="text-[10px] text-slate-500 uppercase border-b border-slate-800">
                                <tr><th class="pb-4">Roll No</th><th>Track</th><th>Payment</th><th>AI Decision</th><th>Actions</th></tr>
                            </thead>
                            <tbody id="admin-table-body" class="text-sm font-medium">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div class="col-span-4 flex flex-col gap-6">
                <div class="glass p-8 rounded-3xl border border-red-500/20 bg-red-950/10">
                    <h3 class="text-xs font-bold text-red-500 uppercase tracking-widest mb-6">Intervention Engine</h3>
                    <div id="live-intervention-box" class="p-4 bg-black/40 rounded-2xl mb-6">
                        <p class="text-[10px] text-slate-500 mb-2 italic">Awaiting AI Flag...</p>
                    </div>
                    <button onclick="forceReExam()" class="w-full py-4 bg-red-600 rounded-xl font-black text-xs mb-2">CANCEL DECISION & FORCE RE-EXAM</button>
                    <button onclick="approveManual()" class="w-full py-4 bg-green-600 rounded-xl font-black text-xs">MANUAL OVERRIDE: PASS</button>
                </div>
            </div>
        </main>
    </div>

    <div id="candidate-portal" class="hidden h-screen flex overflow-hidden">
        <aside class="w-80 border-r border-slate-800 flex flex-col bg-slate-950">
            <div class="p-6">
                <div id="camera-frame" class="rounded-2xl overflow-hidden border-2 border-slate-800 bg-black aspect-video relative">
                    <video id="webcam" class="w-full h-full object-cover" autoplay playsinline></video>
                    <div class="absolute top-2 right-2 flex gap-1">
                        <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                    </div>
                </div>
                <div id="proctor-status" class="mt-4 p-3 bg-green-900/20 border border-green-500/30 rounded-xl text-[10px] text-green-400 font-bold text-center uppercase tracking-widest">Proctoring Secure</div>
            </div>
            <div class="flex-1 p-6 overflow-y-auto border-t border-slate-800">
                <h4 class="text-[9px] text-slate-500 font-bold uppercase mb-4 tracking-widest">System Audit Log</h4>
                <div id="audit-logs" class="space-y-2 font-mono text-[9px] text-yellow-600/70"></div>
            </div>
        </aside>

        <section class="flex-1 flex flex-col">
            <header class="h-20 border-b border-slate-800 px-10 flex items-center justify-between">
                <div>
                    <h2 id="current-track" class="text-sm font-black text-yellow-500 italic"></h2>
                    <p id="candidate-roll-display" class="text-[10px] text-slate-500 font-bold"></p>
                </div>
                <div id="timer" class="text-2xl font-black font-mono tracking-tighter">45:00</div>
            </header>
            <div id="exam-chat" class="flex-1 overflow-y-auto p-12 space-y-8 bg-black/10"></div>
            <footer class="p-8 border-t border-slate-800 bg-slate-950/80">
                <div class="max-w-4xl mx-auto flex gap-4">
                    <input id="candidate-msg" type="text" placeholder="Provide your technical answer..." class="flex-1 bg-slate-900 border border-slate-800 p-5 rounded-2xl outline-none focus:border-yellow-500 font-bold">
                    <button onclick="candidateSubmit()" class="bg-yellow-500 text-black px-10 rounded-2xl font-black uppercase text-xs">Submit Response</button>
                </div>
            </footer>
        </section>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, updateDoc, arrayUnion, onSnapshot, getDocs, collection } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

        // FIREBASE CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyBKqBYNRY_80b_UOLg1ls9pIKdX-Y8b3CM",
            authDomain: "placement-96094.firebaseapp.com",
            projectId: "placement-96094",
            storageBucket: "placement-96094.firebasestorage.app",
            messagingSenderId: "1061247846675",
            appId: "1:1061247846675:web:c6885811fcf1884582b2e6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let sessionUID = null;
        let selectedTrack = "";
        let rollNumber = "";

        // AUTHENTICATION LOGIC
        window.loginAdmin = () => {
            const user = document.getElementById('admin-user').value;
            const pass = document.getElementById('admin-pass').value;
            if(user === "SUPREME" && pass === "GOVT@2026") {
                document.getElementById('auth-gateway').classList.add('hidden');
                document.getElementById('admin-portal').classList.remove('hidden');
                startAdminMonitoring();
            } else { alert("ACCESS DENIED: Unauthorized Admin Login."); }
        };

        window.startCandidateSession = async () => {
            selectedTrack = document.getElementById('track-select').value;
            rollNumber = document.getElementById('candidate-id').value;
            if(!rollNumber) return alert("VALID ROLL NUMBER REQUIRED");

            const uCred = await signInAnonymously(auth);
            sessionUID = uCred.user.uid;

            await setDoc(doc(db, "exam_sessions", sessionUID), {
                roll: rollNumber,
                track: selectedTrack,
                status: "EXAM_ACTIVE",
                payment_verified: true,
                ai_decision: "WAITING",
                logs: [],
                responses: []
            });

            document.getElementById('auth-gateway').classList.add('hidden');
            document.getElementById('candidate-portal').classList.remove('hidden');
            document.getElementById('current-track').innerText = selectedTrack === 'EE' ? "ELECTRICAL ENGINEERING // IES" : "CENTRAL GOVT // RECRUITMENT";
            document.getElementById('candidate-roll-display').innerText = "CANDIDATE: " + rollNumber;

            initProctoring();
            initExamFlow();
            listenToIntervention();
        };

        // ADMIN MONITORING ENGINE
        function startAdminMonitoring() {
            const tableBody = document.getElementById('admin-table-body');
            onSnapshot(collection(db, "exam_sessions"), (snapshot) => {
                tableBody.innerHTML = "";
                snapshot.forEach(docSnap => {
                    const data = docSnap.data();
                    const id = docSnap.id;
                    tableBody.innerHTML += `
                        <tr class="border-b border-slate-800">
                            <td class="py-4 font-mono text-yellow-500">${data.roll}</td>
                            <td>${data.track}</td>
                            <td class="text-green-500 text-xs font-black">VERIFIED</td>
                            <td class="text-xs font-bold ${data.ai_decision === 'FAIL' ? 'text-red-500' : 'text-blue-500'}">${data.ai_decision}</td>
                            <td><button onclick="setActiveIntervention('${id}')" class="bg-red-600/10 text-red-500 px-3 py-1 rounded text-[10px] font-black border border-red-500/20">MANAGE</button></td>
                        </tr>`;
                });
            });
        }

        let targetCandidate = null;
        window.setActiveIntervention = (id) => {
            targetCandidate = id;
            document.getElementById('live-intervention-box').innerHTML = `<p class='text-xs font-bold text-white'>Targeting UID: ${id}</p>`;
        };

        window.forceReExam = async () => {
            if(!targetCandidate) return;
            await updateDoc(doc(db, "exam_sessions", targetCandidate), { status: "RE_EXAM_TRIGGERED", ai_decision: "ADMIN_CANCELLED" });
            alert("Supreme Authority Intervention Successful: Candidate Reset.");
        };

        // EXAM LOGIC
        function initExamFlow() {
            appendMessage("SYSTEM", "Handshake Established. Surveillance Active. Question 1: Explain the principle of Faraday's Law in the context of Power Transformers.");
        }

        window.candidateSubmit = async () => {
            const msg = document.getElementById('candidate-msg').value;
            if(!msg) return;
            appendMessage("CANDIDATE", msg);
            document.getElementById('candidate-msg').value = "";

            // Mock AI Decision Making
            const decision = msg.length < 20 ? "FAIL" : "PASS";
            await updateDoc(doc(db, "exam_sessions", sessionUID), {
                responses: arrayUnion({ text: msg, time: new Date() }),
                ai_decision: decision
            });
        }

        function listenToIntervention() {
            onSnapshot(doc(db, "exam_sessions", sessionUID), (snap) => {
                if(snap.data().status === "RE_EXAM_TRIGGERED") {
                    alert("SUPREME AUTHORITY INTERVENTION: Your current decision has been cancelled. Resetting session.");
                    location.reload();
                }
            });
        }

        // PROCTORING SYSTEM
        function initProctoring() {
            const video = document.getElementById('webcam');
            navigator.mediaDevices.getUserMedia({video: true}).then(s => video.srcObject = s);
            window.onblur = async () => {
                document.getElementById('camera-frame').classList.add('violation-flash');
                document.getElementById('proctor-status').innerText = "SECURITY BREACH DETECTED";
                document.getElementById('proctor-status').className = "mt-4 p-3 bg-red-900 border border-red-500 rounded-xl text-[10px] text-red-100 font-bold text-center uppercase tracking-widest";
                await updateDoc(doc(db, "exam_sessions", sessionUID), { logs: arrayUnion("TAB_SWITCH: " + new Date().toISOString()) });
            };
        }

        function appendMessage(sender, text) {
            const area = document.getElementById('exam-chat');
            const isSys = sender === "SYSTEM";
            area.innerHTML += `
                <div class="flex ${isSys ? 'justify-start' : 'justify-end'}">
                    <div class="${isSys ? 'bg-slate-900 border-l-4 border-yellow-500' : 'bg-yellow-500 text-black font-black'} p-6 rounded-2xl max-w-xl shadow-2xl">
                        <p class="text-[9px] opacity-50 font-bold mb-1 uppercase tracking-widest">${sender}</p>
                        <p class="text-sm leading-relaxed">${text}</p>
                    </div>
                </div>`;
            area.scrollTop = area.scrollHeight;
        }

        // Anti-Cheat Restrictions
        document.addEventListener('contextmenu', e => e.preventDefault());
    </script>
</body>
</html>
