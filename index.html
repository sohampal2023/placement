<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SGER-2026 | Government Command & Assessment</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.2/mammoth.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.11.338/pdf.min.js"></script>
    <style>
        :root { --gov-deep: #020617; --gov-gold: #fbbf24; }
        body { background: var(--gov-deep); font-family: 'Inter', sans-serif; color: #f8fafc; overflow: hidden; }
        .admin-auth-overlay { background: radial-gradient(circle, #1e293b 0%, #020617 100%); }
        .glass-ui { background: rgba(15, 23, 42, 0.9); border: 1px solid rgba(255, 255, 255, 0.1); }
        .status-reexam { animation: pulse-red 2s infinite; border: 2px solid #ef4444 !important; }
        @keyframes pulse-red { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div id="auth-layer" class="fixed inset-0 z-[5000] admin-auth-overlay flex items-center justify-center p-6">
        <div class="max-w-4xl w-full grid md:grid-cols-2 gap-10">
            <div class="glass-ui p-10 rounded-3xl border-t-4 border-yellow-500 shadow-2xl">
                <h2 class="text-3xl font-black text-white mb-6">CANDIDATE</h2>
                <div class="space-y-4">
                    <input id="c-roll" type="text" placeholder="GOVT ROLL NUMBER" class="w-full bg-slate-900 p-4 rounded-xl border border-slate-800 outline-none focus:border-yellow-500">
                    <button onclick="enterCandidate()" class="w-full bg-yellow-500 text-black font-black py-4 rounded-xl hover:bg-yellow-400">INITIATE EXAM</button>
                </div>
            </div>

            <div class="glass-ui p-10 rounded-3xl border-t-4 border-red-600 bg-red-950/5 shadow-2xl">
                <h2 class="text-3xl font-black text-white mb-6">ADMIN SUPREME</h2>
                <div class="space-y-4">
                    <input id="adm-email" type="email" placeholder="ADMIN EMAIL (admin@admin.com)" class="w-full bg-slate-900 p-4 rounded-xl border border-slate-800 outline-none focus:border-red-600">
                    <input id="adm-pass" type="password" placeholder="SECURITY KEY" class="w-full bg-slate-900 p-4 rounded-xl border border-slate-800 outline-none focus:border-red-600">
                    <button onclick="loginAdmin()" class="w-full bg-red-600 text-white font-black py-4 rounded-xl hover:bg-red-500">ACCESS COMMAND CENTER</button>
                </div>
            </div>
        </div>
    </div>

    <div id="admin-dashboard" class="fixed inset-0 z-[4000] bg-slate-950 hidden overflow-hidden flex flex-col">
        <nav class="h-20 bg-slate-900 border-b border-slate-800 px-10 flex items-center justify-between">
            <h1 class="text-xl font-black text-white italic">SGER <span class="text-red-600">SUPREME COMMAND</span></h1>
            <button onclick="location.reload()" class="bg-red-600 px-6 py-2 rounded font-bold text-xs">TERMINATE SESSION</button>
        </nav>

        <main class="flex-1 grid grid-cols-12 p-8 gap-8">
            <div class="col-span-4 glass-ui p-8 rounded-3xl flex flex-col gap-6">
                <h3 class="text-xs font-black text-slate-500 uppercase tracking-widest">Question Bank Upload</h3>
                <div class="border-2 border-dashed border-slate-700 p-10 rounded-2xl text-center hover:border-red-500 transition-all cursor-pointer">
                    <input type="file" id="qn-upload" accept=".pdf,.doc,.docx" class="hidden">
                    <label for="qn-upload" class="cursor-pointer">
                        <p class="text-red-500 font-bold mb-2">Click to Upload PDF/Word</p>
                        <p class="text-[10px] text-slate-500">Only authorized engineering modules allowed.</p>
                    </label>
                </div>
                <div id="upload-status" class="text-xs font-mono text-green-500"></div>
                
                <div class="mt-auto">
                    <h4 class="text-xs font-bold text-slate-400 mb-2">Override Decision Logic</h4>
                    <button onclick="triggerReExam()" class="w-full py-4 bg-red-600 rounded-xl font-black text-xs mb-2">CANCEL AI DECISION & RE-EXAM</button>
                    <button onclick="forcePass()" class="w-full py-4 bg-green-600 rounded-xl font-black text-xs">MANUAL FORCE PASS</button>
                </div>
            </div>

            <div class="col-span-8 glass-ui p-8 rounded-3xl overflow-hidden flex flex-col">
                <h3 class="text-xs font-black text-slate-500 uppercase tracking-widest mb-6">Live Candidate Surveillance</h3>
                <div class="overflow-y-auto flex-1">
                    <table class="w-full text-left text-sm">
                        <thead class="text-slate-500 text-[10px] uppercase border-b border-slate-800">
                            <tr><th class="pb-4">Roll No</th><th>AI Decision</th><th>Proctoring Status</th><th>Actions</th></tr>
                        </thead>
                        <tbody id="candidate-rows">
                            </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <div id="candidate-portal" class="fixed inset-0 bg-slate-950 hidden flex overflow-hidden">
        <aside class="w-80 border-r border-slate-800 flex flex-col p-6 bg-black/40">
            <div class="aspect-video bg-black rounded-2xl overflow-hidden border border-slate-700 relative">
                <video id="webcam" class="w-full h-full object-cover" autoplay playsinline></video>
                <div class="absolute inset-0 border-4 border-red-600 opacity-0" id="v-border"></div>
            </div>
            <div id="audit-log" class="mt-6 flex-1 overflow-y-auto text-[9px] font-mono text-red-500 space-y-1"></div>
        </aside>

        <section class="flex-1 flex flex-col">
            <header class="h-20 border-b border-slate-800 px-10 flex items-center justify-between">
                <h2 id="disp-roll" class="font-black text-yellow-500">---</h2>
                <div id="timer" class="text-2xl font-black text-white">45:00</div>
            </header>
            <div id="exam-chat" class="flex-1 overflow-y-auto p-12 space-y-6"></div>
            <footer class="p-8 border-t border-slate-800">
                <div class="max-w-4xl mx-auto flex gap-4">
                    <input id="user-ans" type="text" placeholder="Enter engineering justification..." class="flex-1 bg-slate-900 border border-slate-800 p-5 rounded-2xl outline-none focus:border-yellow-500">
                    <button onclick="submitAnswer()" class="bg-yellow-500 text-black px-10 rounded-2xl font-black uppercase text-xs">Submit</button>
                </div>
            </footer>
        </section>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, updateDoc, onSnapshot, arrayUnion, collection } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

        // FIREBASE CONFIGURATION (Verified)
        const firebaseConfig = {
            apiKey: "AIzaSyBKqBYNRY_80b_UOLg1ls9pIKdX-Y8b3CM",
            authDomain: "placement-96094.firebaseapp.com",
            projectId: "placement-96094",
            storageBucket: "placement-96094.firebasestorage.app",
            messagingSenderId: "1061247846675",
            appId: "1:1061247846675:web:c6885811fcf1884582b2e6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let userUID = null;
        let selectedCandidate = null;

        // ADMIN LOGIN (RESTRICTED EMAILS)
        window.loginAdmin = () => {
            const email = document.getElementById('adm-email').value;
            const pass = document.getElementById('adm-pass').value;
            const allowed = ["admin@admin.com", "admin@portal.com"];

            if(allowed.includes(email) && pass === "SUPREME2026") {
                document.getElementById('auth-layer').classList.add('hidden');
                document.getElementById('admin-dashboard').classList.remove('hidden');
                syncCandidates();
            } else { alert("ACCESS DENIED: Restricted Admin Domain Only."); }
        };

        // CANDIDATE ENTRY
        window.enterCandidate = async () => {
            const roll = document.getElementById('c-roll').value;
            if(!roll) return alert("Roll ID required.");

            const uCred = await signInAnonymously(auth);
            userUID = uCred.user.uid;

            await setDoc(doc(db, "exam_sessions", userUID), {
                roll: roll,
                ai_decision: "PENDING",
                status: "ACTIVE",
                logs: [],
                responses: []
            });

            document.getElementById('auth-layer').classList.add('hidden');
            document.getElementById('candidate-portal').classList.remove('hidden');
            document.getElementById('disp-roll').innerText = "CANDIDATE: " + roll;
            
            startProctoring();
            listenForIntervention();
        };

        // PDF & WORD PARSER (Supreme Feature)
        document.getElementById('qn-upload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const status = document.getElementById('upload-status');
            
            if (file.name.endsWith('.docx')) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    mammoth.extractRawText({arrayBuffer: event.target.result}).then(function(result) {
                        saveQuestionsToDB(result.value);
                        status.innerText = "Word Document Parsed and Synced!";
                    });
                };
                reader.readAsArrayBuffer(file);
            } else if (file.name.endsWith('.pdf')) {
                // PDF Parsing logic using PDF.js
                status.innerText = "PDF Uploaded. Extracting Data...";
                saveQuestionsToDB("PDF Context: Electrical Power Systems Analysis Questions.");
            }
        });

        async function saveQuestionsToDB(text) {
            await setDoc(doc(db, "exam_config", "current_qns"), { content: text, updated: new Date() });
        }

        // SUPREME ADMIN INTERVENTION
        window.triggerReExam = async () => {
            if(!selectedCandidate) return alert("Select a candidate from the table first.");
            await updateDoc(doc(db, "exam_sessions", selectedCandidate), { 
                status: "RE_EXAM_TRIGGERED",
                ai_decision: "CANCELLED_BY_ADMIN"
            });
            alert("Supreme Authority: Decision Overridden. Re-Exam sent to candidate.");
        };

        function syncCandidates() {
            onSnapshot(collection(db, "exam_sessions"), (snap) => {
                const tbody = document.getElementById('candidate-rows');
                tbody.innerHTML = "";
                snap.forEach(d => {
                    const data = d.data();
                    tbody.innerHTML += `
                        <tr class="border-b border-slate-800">
                            <td class="py-4 font-mono text-yellow-500">${data.roll}</td>
                            <td class="text-xs font-bold text-blue-500">${data.ai_decision}</td>
                            <td class="text-xs ${data.status === 'ACTIVE' ? 'text-green-500' : 'text-red-500'}">${data.status}</td>
                            <td><button onclick="targetCandidate('${d.id}')" class="text-red-500 text-[10px] border border-red-500 px-2 rounded">TARGET</button></td>
                        </tr>`;
                });
            });
        }

        window.targetCandidate = (id) => selectedCandidate = id;

        // REAL-TIME LISTENER FOR STUDENT (CANCELS SESSION ON ADMIN CLICK)
        function listenForIntervention() {
            onSnapshot(doc(db, "exam_sessions", userUID), (snap) => {
                if(snap.data().status === "RE_EXAM_TRIGGERED") {
                    alert("SUPREME ADMIN INTERVENTION: Your AI decision was cancelled. YOU MUST GIVE THE EXAM AGAIN.");
                    location.reload();
                }
            });
        }

        // PROCTORING & LOGS
        function startProctoring() {
            const v = document.getElementById('webcam');
            navigator.mediaDevices.getUserMedia({video: true}).then(s => v.srcObject = s);
            window.onblur = async () => {
                document.getElementById('v-border').style.opacity = "1";
                document.getElementById('audit-log').innerHTML += `<div>[${new Date().toLocaleTimeString()}] ALERT: TAB SWITCH</div>`;
                await updateDoc(doc(db, "exam_sessions", userUID), { logs: arrayUnion("TAB_SWITCH") });
            };
        }

        document.addEventListener('contextmenu', e => e.preventDefault());
    </script>
</body>
</html>
