<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SGER-2026 | HR Command</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.2/mammoth.browser.min.js"></script>
  <style>
    body { background: #020617; color: white; font-family: 'Inter', sans-serif; overflow: hidden; }
    .glass { background: rgba(15,23,42,0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
    .meeting-box { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; height: 100%; }
    video { border-radius: 15px; background: #000; width: 100%; height: 100%; object-fit: cover; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
  </style>
</head>
<body>

<div id="gate-overlay" class="fixed inset-0 flex items-center justify-center p-6 z-50 bg-[#010409]">
  <div class="grid grid-cols-1 md:grid-cols-2 gap-8 w-full max-w-4xl">
    <div class="glass p-8 rounded-3xl border-yellow-500/20">
      <h2 class="text-xl font-bold text-yellow-500 mb-4 uppercase">Candidate</h2>
      <input id="c-email" placeholder="Email" class="w-full p-3 mb-3 rounded bg-black border border-slate-800">
      <input id="c-pass" type="password" placeholder="Password" class="w-full p-3 mb-4 rounded bg-black border border-slate-800">
      <button onclick="candLogin()" class="w-full bg-yellow-500 text-black py-3 rounded-xl font-bold uppercase">Enter Portal</button>
      <p id="msg" class="mt-4 text-xs text-slate-500"></p>
    </div>
    <div class="glass p-8 rounded-3xl border-red-500/20 text-right">
      <h2 class="text-xl font-bold text-red-600 mb-4 uppercase">HR Admin</h2>
      <input id="a-user" placeholder="Admin ID" class="w-full p-3 mb-3 rounded bg-black border border-slate-800">
      <input id="a-key" type="password" placeholder="Key" class="w-full p-3 mb-4 rounded bg-black border border-slate-800">
      <button onclick="adminLogin()" class="w-full bg-red-600 text-white py-3 rounded-xl font-bold uppercase">Authorize</button>
    </div>
  </div>
</div>

<div id="admin-hub" class="hidden fixed inset-0 flex flex-col z-40 bg-slate-950">
  <header class="h-14 glass flex justify-between items-center px-8 border-b border-white/5">
    <span class="text-red-600 font-bold tracking-tighter">SGER_CORE_v2026</span>
    <div class="flex gap-4">
      <button onclick="setMode('AI')" class="bg-yellow-600 px-3 py-1 rounded text-[10px] font-bold">AI MODE</button>
      <button onclick="setMode('LIVE')" class="bg-red-600 px-3 py-1 rounded text-[10px] font-bold">LIVE MODE</button>
    </div>
  </header>
  <main class="flex-1 grid grid-cols-12 gap-4 p-4 overflow-hidden">
    <div class="col-span-3 glass rounded-2xl p-5 flex flex-col">
      <input type="file" id="uploader" class="hidden">
      <label for="uploader" class="block border border-dashed border-slate-700 p-4 text-center rounded-xl cursor-pointer text-xs text-slate-400">Upload Q&A File</label>
      <div id="p-status" class="text-[9px] text-yellow-600 mt-2 font-mono">Status: Awaiting...</div>
      <div class="mt-4 flex-1 flex flex-col bg-black rounded-xl p-2">
        <video id="hr-view-feed" autoplay playsinline class="h-32 mb-2 grayscale"></video>
        <textarea id="live-qn" placeholder="Inject custom question..." class="flex-1 w-full bg-transparent p-2 text-xs outline-none"></textarea>
        <button onclick="pushLiveQ()" class="bg-red-600 py-2 rounded-lg text-[10px] font-bold">SEND LIVE</button>
      </div>
    </div>
    <div class="col-span-9 glass rounded-2xl overflow-y-auto no-scrollbar">
      <table class="w-full text-left text-xs">
        <thead class="text-slate-500 uppercase border-b border-white/5 bg-slate-900/50">
          <tr><th class="p-4">Candidate</th><th class="p-4">Status</th><th class="p-4">Score</th><th class="p-4 text-right">Actions</th></tr>
        </thead>
        <tbody id="matrix" class="divide-y divide-white/5"></tbody>
      </table>
    </div>
  </main>
</div>

<div id="exam-portal" class="hidden fixed inset-0 flex z-30 bg-black">
  <div id="live-ui" class="hidden fixed inset-0 z-50 bg-black p-8 flex flex-col">
    <div class="meeting-box">
      <video id="c-local" autoplay playsinline></video>
      <div class="bg-slate-900 rounded-2xl flex items-center justify-center border border-red-500/30">
        <div class="text-center"><p class="text-red-600 font-bold animate-pulse">PROCTOR INTERVIEW ACTIVE</p></div>
      </div>
    </div>
    <div id="live-display" class="mt-6 p-6 glass rounded-2xl text-center text-xl font-medium border-l-4 border-red-600">Waiting for live question...</div>
  </div>

  <aside class="w-64 border-r border-white/5 p-4 flex flex-col"><video id="c-feed" autoplay playsinline class="grayscale h-40 mb-4"></video></aside>
  <main class="flex-1 flex flex-col">
    <header class="h-16 glass flex justify-between items-center px-8 border-b border-white/5">
      <div id="c-name" class="text-yellow-500 font-bold text-xs">USER_ID</div>
      <div id="clock" class="font-mono text-xl">45:00</div>
    </header>
    <div id="chat" class="flex-1 overflow-y-auto p-10 space-y-6 no-scrollbar"></div>
    <footer class="p-6 flex gap-3 border-t border-white/5 bg-slate-950">
      <input id="ans" class="flex-1 bg-black border border-slate-800 p-4 rounded-xl outline-none" placeholder="Your Answer...">
      <button onclick="sendAns()" class="bg-yellow-500 text-black px-8 rounded-xl font-bold uppercase text-xs">Submit</button>
    </footer>
  </main>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getDatabase, ref, set, onValue, update, push } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBKqBYNRY_80b_UOLg1ls9pIKdX-Y8b3CM",
    authDomain: "placement-96094.firebaseapp.com",
    databaseURL: "https://placement-96094-default-rtdb.firebaseio.com",
    projectId: "placement-96094",
    storageBucket: "placement-96094.firebasestorage.app",
    messagingSenderId: "1061247846675",
    appId: "1:1061247846675:web:c6885811fcf1884582b2e6"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  window.user = null;
  window.target = null;
  window.asked = []; // TRACKS QUESTIONS ALREADY ASKED
  window.currentQ = null;

  // --- HR COMMANDS ---
  window.adminLogin = () => {
    if(document.getElementById('a-user').value === 'admin@sger.gov' && document.getElementById('a-key').value === 'SUPREME2026') {
      document.getElementById('gate-overlay').classList.add('hidden');
      document.getElementById('admin-hub').classList.remove('hidden');
      onValue(ref(db, 'candidates'), (snap) => {
        const data = snap.val() || {};
        const matrix = document.getElementById('matrix');
        matrix.innerHTML = '';
        Object.keys(data).forEach(id => {
          const c = data[id];
          const email = id.replace(/_/g,'.');
          matrix.innerHTML += `<tr>
            <td class="p-4 font-bold text-slate-300">${email}</td>
            <td class="p-4"><span class="px-2 py-0.5 rounded text-[10px] ${c.status==='PENDING'?'bg-yellow-900 text-yellow-300':'bg-green-900 text-green-300'}">${c.status}</span></td>
            <td class="p-4 font-bold text-yellow-500">${c.score || 0}%</td>
            <td class="p-4 text-right">
              <button onclick="approve('${email}')" class="bg-green-600 px-2 py-1 rounded text-[10px]">Approve</button>
              <button onclick="targetUser('${email}')" class="bg-red-600 px-2 py-1 rounded text-[10px] ml-2">Target Live</button>
            </td>
          </tr>`;
        });
      });
    }
  };

  window.approve = (e) => update(ref(db, `candidates/${e.replace(/\./g,'_')}`), {status: 'APPROVED'});
  window.targetUser = (e) => { window.target = e; alert("User Targeted: " + e); };
  window.setMode = (m) => set(ref(db, 'settings/mode'), m);
  window.pushLiveQ = () => {
    if(!window.target) return alert("Select target");
    set(ref(db, `candidates/${window.target.replace(/\./g,'_')}/liveQ`), document.getElementById('live-qn').value);
    document.getElementById('live-qn').value = '';
  };

  // --- CANDIDATE SESSION ---
  window.candLogin = () => {
    const e = document.getElementById('c-email').value.trim();
    const p = document.getElementById('c-pass').value.trim();
    const safe = e.replace(/\./g,'_');
    onValue(ref(db, `candidates/${safe}`), (snap) => {
      const d = snap.val();
      if(!d) {
        set(ref(db, `candidates/${safe}`), {password:p, status:'PENDING', score:0});
        document.getElementById('msg').innerText = "WAITING FOR HR APPROVAL.";
      } else {
        if(d.status === 'PENDING') return alert("APPROVAL REQUIRED");
        window.user = e;
        document.getElementById('gate-overlay').classList.add('hidden');
        document.getElementById('exam-portal').classList.remove('hidden');
        document.getElementById('c-name').innerText = e.toUpperCase();
        initExam();
      }
    }, {onlyOnce: true});
  };

  const initExam = () => {
    navigator.mediaDevices.getUserMedia({video:true}).then(s => {
      document.getElementById('c-feed').srcObject = s;
      document.getElementById('c-local').srcObject = s;
    });

    onValue(ref(db, 'settings/mode'), (snap) => {
      const m = snap.val() || 'AI';
      if(m === 'LIVE') document.getElementById('live-ui').classList.remove('hidden');
      else {
        document.getElementById('live-ui').classList.add('hidden');
        if(!window.currentQ) askAI();
      }
    });

    onValue(ref(db, `candidates/${window.user.replace(/\./g,'_')}/liveQ`), (snap) => {
      if(snap.val()) document.getElementById('live-display').innerText = snap.val();
    });
  };

  const askAI = () => {
    onValue(ref(db, 'settings/bank'), (snap) => {
      const bank = snap.val() || [];
      // FILTER OUT QUESTIONS ALREADY ASKED
      const available = bank.filter((_, index) => !window.asked.includes(index));
      
      if(available.length > 0) {
        const randomIndex = Math.floor(Math.random() * bank.length);
        if(window.asked.includes(randomIndex)) return askAI(); // Retry if index was used
        
        window.asked.push(randomIndex);
        window.currentQ = bank[randomIndex];
        renderMsg('AI_PROCTOR', window.currentQ.q, 'ai');
      } else {
        renderMsg('SYSTEM', "AI Question Bank exhausted. Please wait for HR.", 'ai');
      }
    }, {onlyOnce: true});
  };

  window.sendAns = () => {
    const val = document.getElementById('ans').value;
    if(!val) return;
    renderMsg('YOU', val, 'user');
    document.getElementById('ans').value = '';

    let score = 0;
    if(window.currentQ && window.currentQ.a) {
      const keys = window.currentQ.a.toLowerCase().split(' ').filter(w => w.length > 4);
      let hits = 0;
      keys.forEach(k => { if(val.toLowerCase().includes(k)) hits++; });
      score = Math.floor((hits / keys.length) * 100);
    }
    update(ref(db, `candidates/${window.user.replace(/\./g,'_')}`), {score: score});
    setTimeout(askAI, 2000);
  };

  const renderMsg = (s, m, type) => {
    const b = document.getElementById('chat');
    b.innerHTML += `<div class="${type==='user'?'self-end bg-yellow-500 text-black':'self-start bg-slate-900 border border-white/10'} p-4 rounded-2xl max-w-[70%]">
      <div class="text-[9px] font-bold opacity-50 mb-1 uppercase">${s}</div>${m}</div>`;
    b.scrollTop = b.scrollHeight;
  };

  // --- PARSER ---
  const uploader = document.getElementById('uploader');
  uploader.addEventListener('change', async (e) => {
    const file = e.target.files[0];
    let text = "";
    document.getElementById('p-status').innerText = "PARSING FILE...";
    if(file.name.endsWith('.pdf')) {
      const pdf = await pdfjsLib.getDocument({data: await file.arrayBuffer()}).promise;
      for(let i=1; i<=pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const content = await page.getTextContent();
        text += content.items.map(it => it.str).join(' ') + "\n";
      }
    } else if(file.name.endsWith('.docx')) {
      const res = await mammoth.extractRawText({arrayBuffer: await file.arrayBuffer()});
      text = res.value;
    }
    const blocks = text.split(/Question:|Q\d+:/i).filter(b => b.length > 10);
    const bank = blocks.map(b => {
      const parts = b.split(/Answer:/i);
      return { q: parts[0]?.trim(), a: parts[1]?.trim() };
    });
    set(ref(db, 'settings/bank'), bank);
    document.getElementById('p-status').innerText = bank.length + " UNIQUE QUESTIONS LOADED.";
  });
</script>
</body>
</html>
