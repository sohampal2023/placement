<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>APT-E System | Pro Placement Portal</title>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>

<style>
/* --- APT-E CYBERPUNK THEME (Based on Focus Watchdog) --- */
*{box-sizing:border-box}
html,body{margin:0;height:100%;font-family:'Segoe UI',sans-serif; background:#020617; color:#e5e7eb}
.app{display:grid;grid-template-columns:300px 1fr;height:100vh}

/* SIDEBAR & PROCTORING */
.sidebar{padding:20px; border-right:1px solid #1e293b; display:flex; flex-direction:column; background:#0f172a;}
.proctor-box { width:100%; height:180px; background:#000; border-radius:12px; border:2px solid #1e293b; margin-bottom:15px; overflow:hidden; position:relative; }
#video { width:100%; height:100%; object-fit:cover; }
.violation-badge { position:absolute; top:5px; right:5px; background:#7f1d1d; color:#fca5a5; padding:2px 8px; font-size:10px; font-weight:800; border-radius:4px; }

/* CHAT INTERFACE */
.main{padding:24px; display:flex; flex-direction:column; gap:20px;}
.interview-container { flex-grow:1; background:#020617; border:1px solid #334155; border-radius:20px; display:flex; flex-direction:column; overflow:hidden; }
.chat-window { flex-grow:1; padding:20px; overflow-y:auto; display:flex; flex-direction:column; gap:15px; }
.bubble { max-width:80%; padding:12px 18px; border-radius:18px; font-size:14px; line-height:1.5; }
.ai-bubble { background:#1e293b; color:#7dd3fc; align-self:flex-start; border-bottom-left-radius:2px; border:1px solid #38bdf844; }
.user-bubble { background:#1e40af; color:#fff; align-self:flex-end; border-bottom-right-radius:2px; }

/* SPEEDOMETER (Interview Rating) */
.speedo-container { background:#0f172a; padding:20px; border-radius:20px; border:1px solid #334155; text-align:center; }
.speedo{ width:200px;height:100px;border-radius:200px 200px 0 0; background:conic-gradient(from -90deg, #ef4444, #facc15, #22c55e); position:relative; margin: 0 auto; }
.needle{ position:absolute;width:3px;height:80px; background:#fff; left:50%; bottom:0; transform-origin:bottom center; transition:.6s cubic-bezier(.15,.85,.2,1) }

/* BUTTONS */
.action-btn { width:100%; padding:15px; background:#0ea5e9; border:none; border-radius:12px; color:#fff; font-weight:800; cursor:pointer; text-transform:uppercase; transition:0.2s; }
.action-btn:active { transform:scale(0.98); }
.action-btn.recording { background:#ef4444; animation: pulse 1.5s infinite; }

@keyframes pulse { 0% { opacity:1; } 50% { opacity:0.7; } 100% { opacity:1; } }
.hidden { display:none !important; }
</style>
</head>
<body>

<div class="app">
    <div class="sidebar">
        <h2 style="color:#7dd3fc; text-align:center; letter-spacing:2px; font-size:18px;">APT-E PRO</h2>
        
        <div class="proctor-box">
            <video id="video" autoplay muted></video>
            <div id="vBadge" class="violation-badge">VIOLATIONS: 0/5</div>
        </div>

        <div class="speedo-container">
            <div class="speedo"><div id="needle" class="needle" style="transform: rotate(-90deg)"></div></div>
            <div id="scoreLabel" style="font-size:24px; font-weight:900; color:#38bdf8; margin-top:10px;">0%</div>
            <div id="ratingLabel" style="font-size:12px; color:#94a3b8; text-transform:uppercase;">Interview Grade</div>
        </div>

        <div style="flex-grow:1"></div>
        <button class="action-btn" style="background:#1e293b; margin-bottom:10px;" onclick="location.reload()">🔄 Soft Refresh</button>
        <button id="loginBtn" class="action-btn" onclick="handleLogin()">Secure Login</button>
    </div>

    <div class="main">
        <div class="interview-container">
            <div id="chatWindow" class="chat-window">
                <div class="bubble ai-bubble">
                    <strong>SYSTEM AI:</strong> Welcome candidate. Please click "Start Answering" and state your name to begin the technical evaluation.
                </div>
            </div>
            
            <div style="padding:20px; background:#0f172a; border-top:1px solid #334155;">
                <div id="sttPreview" style="font-size:12px; color:#64748b; font-style:italic; margin-bottom:10px;">Waiting for voice input...</div>
                <button id="micBtn" class="action-btn" onclick="toggleMic()">🎤 Start Answering</button>
            </div>
        </div>

        <div id="uploadBox" class="speedo-container" style="text-align:left">
            <h4 style="margin:0 0 10px 0; color:#38bdf8">SUBMIT RECRUITMENT DOCS</h4>
            <input type="file" id="fileInp" style="font-size:12px;">
            <button onclick="uploadDoc()" style="background:#334155; padding:5px 10px; border:none; border-radius:4px; color:#fff; cursor:pointer;">Upload PDF/DOCX</button>
        </div>
    </div>
</div>

<div id="lockScreen" class="hidden" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(2,6,23,0.98); z-index:9999; display:flex; flex-direction:column; justify-content:center; align-items:center;">
    <h1 style="color:#ef4444; font-size:48px; margin:0;">EXAM TERMINATED</h1>
    <p style="color:#94a3b8;">5 Violations detected. Contact admin@study.com to reset.</p>
    <button onclick="location.reload()" class="action-btn" style="width:200px; margin-top:20px;">Return</button>
</div>

<script>
// --- CONFIGURATION ---
const firebaseConfig = {
  apiKey: "AIzaSyD16NhAUgo3sgag01nZPZGHXjMvAZZ0rDE",
  databaseURL: "https://focus-dashboard-5965a-default-rtdb.firebaseio.com",
  projectId: "focus-dashboard-5965a",
  storageBucket: "focus-dashboard-5965a.appspot.com",
};

// Initialize Firebase
const app = firebase.initializeApp(firebaseConfig);
const db = firebase.database();
let violations = 0;
let isRecording = false;
let studentId = "soham_pal";

// --- AI MARKING ENGINE (From Your IoT PDF) ---
const answerKey = {
    "iot": ["sensors", "interconnected", "network", "data", "internet"],
    "m2m": ["machine", "point-to-point", "closed", "wired"],
    "cryptography": ["encryption", "decryption", "keys", "security"]
};

// --- PROCTORING LOGIC ---
async function startProctoring() {
    const model = await cocoSsd.load();
    const video = document.getElementById('video');
    
    setInterval(async () => {
        const predictions = await model.detect(video);
        let phoneFound = predictions.some(p => p.class === 'cell phone');
        let persons = predictions.filter(p => p.class === 'person').length;

        if (phoneFound || persons > 1 || persons === 0) {
            violations++;
            document.getElementById('vBadge').innerText = `VIOLATIONS: ${violations}/5`;
            if (violations >= 5) terminateExam();
        }
    }, 3000);
}

function terminateExam() {
    document.getElementById('lockScreen').classList.remove('hidden');
}

// --- VOICE & CHAT LOGIC ---
const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
recognition.continuous = true;
recognition.interimResults = true;

function toggleMic() {
    const btn = document.getElementById('micBtn');
    if (!isRecording) {
        recognition.start();
        btn.innerText = "⏹ Stop & Submit";
        btn.classList.add('recording');
    } else {
        recognition.stop();
        btn.innerText = "🎤 Start Answering";
        btn.classList.remove('recording');
        processResponse(document.getElementById('sttPreview').innerText);
    }
    isRecording = !isRecording;
}

recognition.onresult = (event) => {
    const text = Array.from(event.results).map(r => r[0].transcript).join('');
    document.getElementById('sttPreview').innerText = text;
};

function processResponse(text) {
    const chat = document.getElementById('chatWindow');
    chat.innerHTML += `<div class="bubble user-bubble">${text}</div>`;
    chat.scrollTop = chat.scrollHeight;

    // Automated Marking Logic
    let score = 0;
    const words = text.toLowerCase();
    answerKey["iot"].forEach(kw => { if(words.includes(kw)) score += 20; });
    
    updateSpeedo(score);
    db.ref(`interviews/${studentId}/last_answer`).set({ text, score, time: Date.now() });
}

function updateSpeedo(percent) {
    const rotation = (percent / 100) * 180 - 90;
    document.getElementById('needle').style.transform = `rotate(${rotation}deg)`;
    document.getElementById('scoreLabel').innerText = percent + "%";
}
// Marking Logic for Any Subject
window.calculateDynamicScore = async function(transcript, currentSubject) {
    const snap = await get(ref(db, `settings/subjects/${currentSubject}/keywords`));
    if (!snap.exists()) return 0;

    const keywords = snap.val(); // List of keywords from your uploaded PDF
    const studentText = transcript.toLowerCase();
    let matches = 0;

    keywords.forEach(word => {
        if (studentText.includes(word.toLowerCase())) {
            matches++;
        }
    });

    // Score = (Matches / Total Keywords) * 100
    return Math.round((matches / keywords.length) * 100);
};
// --- INITIALIZE ---
window.onload = () => {
    navigator.mediaDevices.getUserMedia({ video: true }).then(s => {
        document.getElementById('video').srcObject = s;
        startProctoring();
    });
    
    // Admin Live Question Listener
    db.ref(`interviews/${studentId}/live_qn`).on('value', (snap) => {
        const qn = snap.val();
        if(qn) {
            const chat = document.getElementById('chatWindow');
            chat.innerHTML += `<div class="bubble ai-bubble"><strong>INTERVIEWER:</strong> ${qn}</div>`;
            const msg = new SpeechSynthesisUtterance(qn);
            window.speechSynthesis.speak(msg);
        }
    });
};
</script>
</body>
</html>
