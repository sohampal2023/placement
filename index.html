<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Placement Portal | Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Placement Portal</h1>
            <div id="notice-board">
                <h3>🔔 Latest Updates</h3>
                <ul id="notices-list">Loading updates...</ul>
            </div>
        </header>

        <section class="login-card">
            <h2>Login</h2>
            <form id="loginForm">
                <input type="email" id="email" placeholder="Email (Admin: admin@admin.com)" required>
                <input type="password" id="password" placeholder="Password" required>
                <button type="submit" id="loginBtn">Enter Dashboard</button>
            </form>
        </section>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
