<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Exam Portal 2026</title>
    <style>
        body { font-family: system-ui, sans-serif; padding: 20px; background: #f4f4f9; color: #333; }
        .box { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 15px; shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .hidden { display: none; }
        button { width: 100%; padding: 12px; margin: 10px 0; cursor: pointer; border: none; border-radius: 8px; background: #007bff; color: white; font-size: 16px; }
        .timer { color: red; font-weight: bold; text-align: center; font-size: 20px; }
        .option-btn { background: #eee; color: #333; text-align: left; }
        .option-btn:hover { background: #ddd; }
    </style>
</head>
<body>

<div class="box">
    <div id="login-section">
        <h2>Enter Exam Portal</h2>
        <input type="email" id="email" placeholder="Email" style="width:95%; padding:10px; margin-bottom:10px;">
        <input type="password" id="pass" placeholder="Password" style="width:95%; padding:10px;">
        <button onclick="startExam()">Start Test</button>
    </div>

    <div id="exam-section" class="hidden">
        <div class="timer" id="timer">60:00</div>
        <hr>
        <h3 id="q-text">Question loading...</h3>
        <div id="options-area"></div>
    </div>

    <div id="interview-section" class="hidden">
        <h2>AI Interview Phase</h2>
        <p>Listen to the question and record your answer.</p>
        <button style="background:#6f42c1" onclick="askQuestion()">🔈 Hear Question</button>
        <button style="background:#28a745" onclick="recordAnswer()">🎤 Record Answer</button>
        <p id="transcript" style="font-style:italic; color:gray;"></p>
        <button onclick="finishAll()" style="background:#333">Submit Final Test</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBKqBYNRY_80b_UOLg1ls9pIKdX-Y8b3CM",
        authDomain: "placement-96094.firebaseapp.com",
        projectId: "placement-96094",
        storageBucket: "placement-96094.firebasestorage.app",
        messagingSenderId: "1061247846675",
        appId: "1:1061247846675:web:c6885811fcf1884582b2e6"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let timeLeft = 3600; 
    let currentQ = 0;
    let questions = [
        { q: "What is 10 + 5?", opts: ["12", "15", "20", "25"], ans: "15" },
        { q: "Which language is used for web?", opts: ["Java", "Python", "HTML", "C++"], ans: "HTML" }
    ];

    window.startExam = () => {
        const mail = document.getElementById('email').value;
        const pass = document.getElementById('pass').value;
        if(mail === "admin@admin.com" && pass === "Admin@1234") {
             alert("Admin logged in. Showing responses...");
             // logic to show responses
        } else {
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('exam-section').classList.remove('hidden');
            runTimer();
            loadQuestion();
        }
    };

    function runTimer() {
        setInterval(() => {
            timeLeft--;
            let m = Math.floor(timeLeft/60);
            let s = timeLeft%60;
            document.getElementById('timer').innerText = `${m}:${s<10?'0':''}${s}`;
            if(timeLeft <= 0) finishAll();
        }, 1000);
    }

    function loadQuestion() {
        if(currentQ >= questions.length) {
            document.getElementById('exam-section').classList.add('hidden');
            document.getElementById('interview-section').classList.remove('hidden');
            return;
        }
        document.getElementById('q-text').innerText = questions[currentQ].q;
        const area = document.getElementById('options-area');
        area.innerHTML = "";
        questions[currentQ].opts.forEach(opt => {
            area.innerHTML += `<button class="option-btn" onclick="nextQ()">${opt}</button>`;
        });
    }

    window.nextQ = () => {
        currentQ++;
        loadQuestion();
    };

    window.askQuestion = () => {
        let msg = new SpeechSynthesisUtterance("Tell me about your technical goals.");
        window.speechSynthesis.speak(msg);
    };

    window.recordAnswer = () => {
        const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        rec.start();
        rec.onresult = (e) => {
            const text = e.results[0][0].transcript;
            document.getElementById('transcript').innerText = "Recorded: " + text;
            addDoc(collection(db, "results"), { email: document.getElementById('email').value, answer: text });
        };
    };

    window.finishAll = () => {
        alert("Exam Submitted Successfully!");
        location.reload();
    };
</script>

</body>
</html>
